name: Test WorkFlow
on: workflow_dispatch
jobs:
  first-job:
     runs-on: ubuntu-latest
     steps:
       - name: Get Code
         uses: actions/checkout@v3
       - name: Install Nodejs
         uses: actions/setup-node@v3
         with:
           node-version: '18'
       - name: Install Dependencies
         run: npm install
       - name: Run Tests
         run: npm test
