name: Events Test
on:
  push:
    branches:
      - main
jobs:
  first-job:
     runs-on: ubuntu-latest
     steps:
       - name: Get Code
         uses: actions/checkout@v3
       - name: Install Nodejs
         uses: actions/setup-node@v3
         with:
           node-version: 18
       - name: Install Dependencies
         run: npm ci
       - name: Build
         run: npm run build
       - name: Upload Build Artifacts
         uses: actions/upload-artifact@v4
         with:
           name: dist-files
           path: |
             dist/
             package.json
  deploy:
    needs: first-job
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-files
      - name: List Files
        run: ls -la
      - name: Deploy
        run: echo "Deploying to production"